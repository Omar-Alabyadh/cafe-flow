name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/cafeflow_ci
          AUTH_SECRET: ci-dummy-auth-secret
          PLATFORM_OWNER_EMAIL: operator@example.com
        run: npm run build
